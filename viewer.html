<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Viewer — Ren Deliverables</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: rgba(255,255,255,0.08);
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #22d3ee;
    --code-bg: #0d1117;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #0f172a;
      --text-dim: #64748b;
      --accent: #0891b2;
      --code-bg: #f1f5f9;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 40px 20px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  .back { 
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--accent); text-decoration: none; font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .back:hover { text-decoration: underline; }
  #content h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
  #content h2 { font-size: 1.5rem; font-weight: 600; margin: 32px 0 16px; padding-top: 24px; border-top: 1px solid var(--border); }
  #content h3 { font-size: 1.2rem; font-weight: 600; margin: 24px 0 12px; color: var(--accent); }
  #content h4 { font-size: 1rem; font-weight: 600; margin: 20px 0 10px; }
  #content p { margin-bottom: 16px; }
  #content ul, #content ol { margin: 0 0 16px 24px; }
  #content li { margin-bottom: 8px; }
  #content code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
  }
  #content pre {
    background: var(--code-bg);
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin-bottom: 16px;
  }
  #content pre code { background: none; padding: 0; }
  #content table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }
  #content th, #content td {
    border: 1px solid var(--border);
    padding: 10px 12px;
    text-align: left;
  }
  #content th { background: var(--surface); font-weight: 600; }
  #content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    margin: 16px 0;
    color: var(--text-dim);
    font-style: italic;
  }
  #content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  #content a { color: var(--accent); }
  #content strong { font-weight: 600; }
  #content em { color: var(--text-dim); }
  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  .error { color: #fb7185; padding: 20px; background: rgba(251,113,133,0.1); border-radius: 8px; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back">← Back to Index</a>
  <div id="content"><div class="loading">Loading document...</div></div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const file = params.get('file');

if (file) {
  fetch(file)
    .then(r => {
      if (!r.ok) throw new Error('File not found');
      return r.text();
    })
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
      // Update title from first h1
      const h1 = document.querySelector('#content h1');
      if (h1) document.title = h1.textContent + ' — Ren Deliverables';
    })
    .catch(e => {
      document.getElementById('content').innerHTML = `<div class="error">Error loading document: ${e.message}</div>`;
    });
} else {
  document.getElementById('content').innerHTML = '<div class="error">No file specified. Use ?file=path/to/file.md</div>';
}
</script>
</body>
</html>
