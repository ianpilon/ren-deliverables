<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ren & Ian — Interaction History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc; --surface: #ffffff; --surface-hover: #f1f5f9;
    --border: rgba(0,0,0,0.08); --text: #0f172a; --text-dim: #64748b;
    --accent: #0891b2; --accent-dim: rgba(8,145,178,0.1);
    --green: #059669; --amber: #d97706; --rose: #e11d48; --purple: #7c3aed;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
    --border: rgba(255,255,255,0.08); --text: #f1f5f9; --text-dim: #94a3b8;
    --accent: #22d3ee; --accent-dim: rgba(34,211,238,0.15);
    --green: #34d399; --amber: #fbbf24; --rose: #fb7185; --purple: #a78bfa;
  }
  .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 1.2rem; z-index: 100; transition: all 0.2s; }
  .theme-toggle:hover { border-color: var(--accent); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  
  header { text-align: center; margin-bottom: 48px; }
  h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .subtitle { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 16px; }
  .last-updated { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 0.85rem; color: var(--text-dim); }
  .last-updated strong { color: var(--accent); }
  
  .timeline { margin-bottom: 32px; }
  .timeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .timeline-title { font-size: 1rem; font-weight: 600; color: var(--text); }
  .timeline-hint { font-size: 0.8rem; color: var(--text-dim); }
  .timeline-container { position: relative; }
  .timeline-track { display: flex; gap: 0; overflow-x: auto; padding: 20px 0 30px 0; scroll-behavior: smooth; }
  .timeline-line { position: absolute; top: 28px; left: 0; right: 0; height: 2px; background: var(--border); z-index: 0; }
  
  .timeline-item { flex: 0 0 auto; width: 180px; position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 0 12px; cursor: pointer; }
  .timeline-node { width: 16px; height: 16px; border-radius: 50%; background: var(--text-dim); border: 3px solid var(--bg); box-shadow: 0 0 0 2px var(--text-dim); margin-bottom: 16px; transition: all 0.2s; }
  .timeline-item:hover .timeline-node { transform: scale(1.2); }
  .timeline-item.active .timeline-node { background: var(--accent); box-shadow: 0 0 0 2px var(--accent), 0 0 12px var(--accent-dim); transform: scale(1.2); }
  
  .timeline-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; width: 100%; transition: all 0.2s; text-align: center; }
  .timeline-item:hover .timeline-card { border-color: var(--accent); transform: translateY(-2px); }
  .timeline-item.active .timeline-card { border-color: var(--accent); border-width: 2px; box-shadow: 0 4px 20px rgba(34,211,238,0.15); }
  
  .timeline-date { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .timeline-stats { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; }
  .timeline-preview { font-size: 0.75rem; color: var(--text-dim); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  
  .day-content { display: none; }
  .day-content.active { display: block; }
  
  .day-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .day-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .day-summary { color: var(--text-dim); font-size: 1rem; line-height: 1.6; }
  
  .section { margin-top: 28px; }
  .section-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; color: var(--accent); }
  .section-title::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-main { padding: 18px 20px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; transition: background 0.2s; }
  .card-main:hover { background: var(--surface-hover); }
  .card-toggle { color: var(--text-dim); font-size: 0.8rem; transition: transform 0.2s; flex-shrink: 0; margin-top: 4px; }
  .card.expanded .card-toggle { transform: rotate(90deg); }
  .card-content { flex: 1; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  .card-title { font-size: 1.05rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .card-desc { color: var(--text-dim); font-size: 0.9rem; line-height: 1.5; }
  .card-context { display: none; padding: 0 20px 18px 44px; border-top: 1px solid var(--border); }
  .card.expanded .card-context { display: block; }
  .card-context-raw { background: var(--bg); border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; }
  
  .category-badge { font-size: 0.65rem; font-weight: 600; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .error { text-align: center; padding: 60px 20px; color: var(--rose); }
  
  .meta { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim); font-size: 0.9rem; }
  .meta a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
<div class="container">
  <header>
    <h1>🐋 Ren & Ian</h1>
    <p class="subtitle" id="subtitle">Our Interaction History</p>
    <div class="last-updated" id="lastUpdated">Loading...</div>
  </header>
  
  <div class="timeline">
    <div class="timeline-header">
      <div class="timeline-title">📅 Our Timeline</div>
      <div class="timeline-hint">past ← → today</div>
    </div>
    <div class="timeline-container">
      <div class="timeline-line"></div>
      <div class="timeline-track" id="timelineTrack"></div>
    </div>
  </div>
  
  <div id="dayContent">
    <div class="loading">Loading milestones...</div>
  </div>
  
  <div class="meta">
    <p>Built by <a href="https://github.com/ianpilon">Ian</a> & 🐋 Ren — <a href="https://github.com/ianpilon/ren-deliverables">View source</a></p>
  </div>
</div>

<script>
// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}

// Load saved theme
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
})();

// Category colors
const categoryColors = {
  identity: { bg: 'rgba(99,102,241,0.15)', color: '#6366f1' },
  capability: { bg: 'rgba(34,197,94,0.15)', color: '#22c55e' },
  architecture: { bg: 'rgba(245,158,11,0.15)', color: '#f59e0b' },
  orchestration: { bg: 'rgba(236,72,153,0.15)', color: '#ec4899' },
  research: { bg: 'rgba(139,92,246,0.15)', color: '#8b5cf6' },
  deliverable: { bg: 'rgba(20,184,166,0.15)', color: '#14b8a6' },
  failure: { bg: 'rgba(239,68,68,0.15)', color: '#ef4444' },
  social: { bg: 'rgba(6,182,212,0.15)', color: '#06b6d4' },
  planning: { bg: 'rgba(132,204,22,0.15)', color: '#84cc16' },
  mission: { bg: 'rgba(249,115,22,0.15)', color: '#f97316' }
};

// Format date for display
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatFullDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} — ${days[d.getDay()]}`;
}

function formatLastUpdated(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) + 
         ' @ ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZoneName: 'short' });
}

// Group milestones by date
function groupByDate(milestones) {
  const grouped = {};
  milestones.forEach(m => {
    if (!grouped[m.date]) grouped[m.date] = [];
    grouped[m.date].push(m);
  });
  return grouped;
}

// Render timeline
function renderTimeline(grouped, dates, activeDate) {
  const track = document.getElementById('timelineTrack');
  track.innerHTML = dates.map(date => {
    const items = grouped[date];
    const isActive = date === activeDate;
    const preview = items.map(m => m.emoji + ' ' + m.title).join(', ');
    const stats = items.length === 1 ? items[0].category : `${items.length} milestones`;
    
    return `
      <div class="timeline-item ${isActive ? 'active' : ''}" data-date="${date}" onclick="showDay('${date}')">
        <div class="timeline-node"></div>
        <div class="timeline-card">
          <div class="timeline-date">${formatDate(date)}</div>
          <div class="timeline-stats">${stats}</div>
          <div class="timeline-preview">${preview}</div>
        </div>
      </div>
    `;
  }).join('');
  
  // Scroll active into view
  setTimeout(() => {
    const active = track.querySelector('.timeline-item.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 100);
}

// Render day content
function renderDayContent(grouped, dates) {
  const container = document.getElementById('dayContent');
  container.innerHTML = dates.map(date => {
    const items = grouped[date];
    const summary = items.map(m => m.title).join(', ');
    
    const cards = items.map(m => {
      const catStyle = categoryColors[m.category] || { bg: 'rgba(100,100,100,0.15)', color: '#666' };
      const hasContext = m.description || m.lesson;
      
      return `
        <div class="card" onclick="this.classList.toggle('expanded')">
          <div class="card-main">
            ${hasContext ? '<span class="card-toggle">▶</span>' : '<span style="width:16px"></span>'}
            <div class="card-content">
              <div class="card-header">
                <div class="card-title">${m.emoji || '📌'} ${m.title}</div>
                <span class="category-badge" style="background:${catStyle.bg};color:${catStyle.color}">${m.category}</span>
              </div>
              <div class="card-desc">${m.description || ''}</div>
            </div>
          </div>
          ${hasContext ? `
          <div class="card-context">
            <div class="card-context-raw">${m.lesson ? '🎓 Lesson: ' + m.lesson : m.description}</div>
          </div>
          ` : ''}
        </div>
      `;
    }).join('');
    
    return `
      <div class="day-content" id="day-${date}">
        <div class="day-header">
          <div class="day-title">📅 ${formatFullDate(date)}</div>
          <div class="day-summary">${summary}</div>
        </div>
        <div class="section">
          <div class="section-title">Milestones</div>
          <div class="cards">${cards}</div>
        </div>
      </div>
    `;
  }).join('');
}

// Show specific day
let currentDate = null;
function showDay(date) {
  // Update timeline
  document.querySelectorAll('.timeline-item').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });
  
  // Update content
  document.querySelectorAll('.day-content').forEach(el => {
    el.classList.toggle('active', el.id === 'day-' + date);
  });
  
  currentDate = date;
}

// Load data and render
async function init() {
  try {
    const res = await fetch('data/milestones.json?t=' + Date.now());
    if (!res.ok) throw new Error('Failed to load milestones');
    const data = await res.json();
    
    // Update header
    const { start, end } = data.meta.dateRange;
    document.getElementById('subtitle').textContent = 
      `Our Interaction History — ${formatDate(start)} to ${formatDate(end)}, ${new Date(end + 'T12:00:00').getFullYear()}`;
    document.getElementById('lastUpdated').innerHTML = 
      `Last updated: <strong>${formatLastUpdated(data.meta.lastUpdated)}</strong>`;
    
    // Group and sort
    const grouped = groupByDate(data.milestones);
    const dates = Object.keys(grouped).sort();
    const latestDate = dates[dates.length - 1];
    
    // Render
    renderTimeline(grouped, dates, latestDate);
    renderDayContent(grouped, dates);
    showDay(latestDate);
    
  } catch (err) {
    document.getElementById('dayContent').innerHTML = 
      `<div class="error">Error loading milestones: ${err.message}</div>`;
    console.error(err);
  }
}

init();
</script>
</body>
</html>
